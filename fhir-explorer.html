<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FHIR Explorer — hapi.fhir.org/baseR4</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #4299e1;
      --green:  #48bb78;
      --red:    #fc8181;
      --purple: #9f7aea;
      --gray:   #718096;
      --dark:   #2d3748;
      --light:  #f0f4f8;
      --white:  #ffffff;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: var(--light);
      color: var(--dark);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 頂部 Header ── */
    header {
      background: #1a365d;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
    .server-badge {
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-family: monospace;
    }

    /* ── 主體 Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 左側面板 ── */
    .sidebar {
      width: 300px;
      min-width: 260px;
      background: var(--white);
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-title {
      padding: 14px 16px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #e2e8f0;
    }
    .sidebar-scroll { overflow-y: auto; flex: 1; }

    /* 資源類型選單 */
    .resource-group { margin-bottom: 4px; }
    .resource-group-title {
      padding: 8px 16px 4px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .resource-item {
      padding: 7px 16px;
      font-size: 0.83rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .resource-item:hover   { background: #ebf8ff; border-left-color: var(--blue); }
    .resource-item.active  { background: #ebf8ff; border-left-color: var(--blue); font-weight: 700; color: #2b6cb0; }
    .resource-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── 右側內容 ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 搜尋工具列 */
    .toolbar {
      background: var(--white);
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .toolbar-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar-row label { font-size: 0.75rem; font-weight: 600; color: var(--gray); white-space: nowrap; }

    input[type="text"], input[type="number"], select {
      padding: 7px 10px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.83rem;
      color: var(--dark);
      background: var(--white);
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(66,153,225,0.18);
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary  { background: var(--blue);   color: #fff; }
    .btn-primary:hover  { background: #2b6cb0; }
    .btn-success  { background: var(--green);  color: #fff; }
    .btn-success:hover  { background: #276749; }
    .btn-neutral  { background: #e2e8f0; color: var(--dark); }
    .btn-neutral:hover  { background: #cbd5e0; }

    .param-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .param-chip {
      display: flex;
      align-items: center;
      background: #ebf8ff;
      border: 1px solid #bee3f8;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.75rem;
      gap: 4px;
      color: #2c5282;
    }
    .param-chip button {
      background: none; border: none; cursor: pointer;
      color: #a0aec0; font-size: 0.9rem; line-height: 1; padding: 0;
    }
    .param-chip button:hover { color: var(--red); }

    /* URL 預覽 */
    .url-preview {
      font-family: monospace;
      font-size: 0.72rem;
      color: #4a5568;
      background: #f7fafc;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
      word-break: break-all;
      flex: 1;
    }

    /* 結果區 */
    .results {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .results-header {
      padding: 10px 16px;
      background: var(--white);
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 8px;
    }
    .results-summary { font-size: 0.78rem; color: var(--gray); }
    .results-summary strong { color: var(--dark); }
    .pagination { display: flex; gap: 6px; align-items: center; }
    .page-info { font-size: 0.75rem; color: var(--gray); }

    .table-wrap { flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    thead tr { background: #f7fafc; position: sticky; top: 0; z-index: 1; }
    th {
      text-align: left;
      padding: 9px 12px;
      font-weight: 700;
      color: var(--gray);
      border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f4f8;
      color: var(--dark);
      vertical-align: top;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tbody tr { cursor: pointer; transition: background 0.1s; }
    tbody tr:hover { background: #ebf8ff; }
    tbody tr.selected { background: #bee3f8; }

    .cell-id { font-family: monospace; font-size: 0.72rem; color: #4a5568; }
    .cell-type { font-weight: 600; color: #2b6cb0; }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 0.68rem;
      font-weight: 700;
    }
    .status-final     { background: #c6f6d5; color: #276749; }
    .status-active    { background: #bee3f8; color: #2c5282; }
    .status-preliminary { background: #fefcbf; color: #744210; }
    .status-amended   { background: #e9d8fd; color: #553c9a; }
    .status-other     { background: #e2e8f0; color: #4a5568; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #a0aec0;
      font-size: 0.88rem;
      gap: 8px;
    }
    .empty-state .icon { font-size: 2.5rem; }

    /* ── 詳細面板（右側抽屜） ── */
    .detail-panel {
      width: 0;
      background: #1a202c;
      overflow: hidden;
      transition: width 0.25s ease;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .detail-panel.open { width: 420px; min-width: 320px; }
    .detail-header {
      padding: 12px 16px;
      background: #2d3748;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .detail-header h4 { font-size: 0.85rem; font-family: monospace; }
    .btn-close-detail {
      background: none; border: none; color: #a0aec0;
      font-size: 1.1rem; cursor: pointer; line-height: 1;
    }
    .btn-close-detail:hover { color: #fff; }
    #detailBody {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      font-family: monospace;
      font-size: 0.73rem;
      color: #e2e8f0;
      white-space: pre;
      line-height: 1.6;
    }

    /* JSON 語法高亮 */
    .json-key    { color: #90cdf4; }
    .json-str    { color: #68d391; }
    .json-num    { color: #f6ad55; }
    .json-bool   { color: #fc8181; }
    .json-null   { color: #a0aec0; }

    /* Spinner */
    .spinner-sm {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: #2d3748;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.82rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>🔍 FHIR Explorer</h1>
  <span class="server-badge">https://hapi.fhir.org/baseR4</span>
</header>

<div class="main">

  <!-- 左側資源選單 -->
  <nav class="sidebar">
    <div class="sidebar-title">Resource Types</div>
    <div class="sidebar-scroll" id="resourceNav"></div>
  </nav>

  <!-- 右側內容 -->
  <div class="content">

    <!-- 搜尋工具列 -->
    <div class="toolbar">
      <div class="toolbar-row">
        <label>搜尋參數：</label>
        <input type="text" id="paramKey"   placeholder="參數名稱（如 patient）" style="width:160px" />
        <input type="text" id="paramValue" placeholder="值（如 90252386）"     style="width:180px" />
        <button class="btn btn-neutral" onclick="addParam()">＋ 加入</button>
        <div class="param-group" id="paramChips"></div>
      </div>
      <div class="toolbar-row">
        <label>排序：</label>
        <input type="text" id="sortParam" placeholder="_sort（如 -date）" style="width:140px" />
        <label>筆數：</label>
        <input type="number" id="countParam" value="20" min="1" max="200" style="width:70px" />
        <button class="btn btn-primary" id="btnSearch" onclick="doSearch()">
          <span class="spinner-sm" id="searchSpinner"></span>
          搜尋
        </button>
        <button class="btn btn-neutral" onclick="clearParams()">清除</button>
        <button class="btn btn-success" onclick="exportJSON()" id="btnExport" style="display:none">匯出 JSON</button>
      </div>
      <div class="toolbar-row">
        <div class="url-preview" id="urlPreview">選擇左側資源類型以開始</div>
      </div>
    </div>

    <!-- 結果 -->
    <div class="results" id="resultsArea">
      <div class="empty-state">
        <span class="icon">📋</span>
        <span>從左側選擇 Resource Type 開始查詢</span>
      </div>
    </div>

  </div>

  <!-- 詳細面板 -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h4 id="detailTitle">Resource Detail</h4>
      <button class="btn-close-detail" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = 'https://hapi.fhir.org/baseR4';

/* ── Resource 類別定義 ── */
const RESOURCE_GROUPS = [
  {
    group: '個人與就診',
    color: '#4299e1',
    items: ['Patient', 'Encounter', 'EpisodeOfCare', 'RelatedPerson']
  },
  {
    group: '臨床觀察',
    color: '#48bb78',
    items: ['Observation', 'DiagnosticReport', 'ImagingStudy', 'Specimen']
  },
  {
    group: '用藥',
    color: '#ed8936',
    items: ['MedicationRequest', 'MedicationStatement', 'MedicationAdministration', 'Medication']
  },
  {
    group: '疾病與處置',
    color: '#fc8181',
    items: ['Condition', 'Procedure', 'AllergyIntolerance', 'FamilyMemberHistory']
  },
  {
    group: '預防保健',
    color: '#9f7aea',
    items: ['Immunization', 'CarePlan', 'Goal', 'ServiceRequest']
  },
  {
    group: '醫療人員與機構',
    color: '#f6ad55',
    items: ['Practitioner', 'Organization', 'Location', 'HealthcareService']
  },
  {
    group: '基礎設施',
    color: '#a0aec0',
    items: ['StructureDefinition', 'ValueSet', 'CodeSystem', 'CapabilityStatement']
  }
];

let currentResource = null;
let currentParams   = {};
let currentBundle   = null;
let nextUrl         = null;
let prevStack       = [];

/* ── 建立左側選單 ── */
function buildNav() {
  const nav = document.getElementById('resourceNav');
  RESOURCE_GROUPS.forEach(g => {
    const title = document.createElement('div');
    title.className = 'resource-group-title';
    title.textContent = g.group;
    nav.appendChild(title);

    g.items.forEach(name => {
      const item = document.createElement('div');
      item.className = 'resource-item';
      item.dataset.resource = name;
      item.innerHTML = `<span class="resource-dot" style="background:${g.color}"></span>${name}`;
      item.addEventListener('click', () => selectResource(name, item));
      nav.appendChild(item);
    });
  });
}

function selectResource(name, el) {
  document.querySelectorAll('.resource-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentResource = name;
  currentParams   = {};
  nextUrl         = null;
  prevStack       = [];
  document.getElementById('paramChips').innerHTML = '';
  updateURLPreview();
  doSearch();
}

/* ── 搜尋參數管理 ── */
function addParam() {
  const k = document.getElementById('paramKey').value.trim();
  const v = document.getElementById('paramValue').value.trim();
  if (!k || !v) { showToast('請填寫參數名稱與值'); return; }
  currentParams[k] = v;
  document.getElementById('paramKey').value   = '';
  document.getElementById('paramValue').value = '';
  renderChips();
  updateURLPreview();
}

function removeParam(k) {
  delete currentParams[k];
  renderChips();
  updateURLPreview();
}

function clearParams() {
  currentParams = {};
  document.getElementById('paramChips').innerHTML = '';
  document.getElementById('paramKey').value   = '';
  document.getElementById('paramValue').value = '';
  document.getElementById('sortParam').value  = '';
  updateURLPreview();
}

function renderChips() {
  const wrap = document.getElementById('paramChips');
  wrap.innerHTML = '';
  Object.entries(currentParams).forEach(([k, v]) => {
    const chip = document.createElement('div');
    chip.className = 'param-chip';
    chip.innerHTML = `${k}=${v} <button onclick="removeParam('${k}')">✕</button>`;
    wrap.appendChild(chip);
  });
}

function buildURL(base, extra = {}) {
  if (!currentResource) return BASE;
  const params = new URLSearchParams();
  Object.entries({...currentParams, ...extra}).forEach(([k, v]) => params.set(k, v));
  const sort  = document.getElementById('sortParam').value.trim();
  const count = document.getElementById('countParam').value || '20';
  if (sort)  params.set('_sort',  sort);
  params.set('_count', count);
  params.set('_format', 'json');
  return `${BASE}/${currentResource}?${params.toString()}`;
}

function updateURLPreview() {
  document.getElementById('urlPreview').textContent = currentResource ? buildURL(BASE) : '選擇左側資源類型以開始';
}

/* ── 執行搜尋 ── */
async function doSearch(url) {
  if (!currentResource && !url) { showToast('請先選擇資源類型'); return; }
  const fetchUrl = url || buildURL(BASE);
  const btn = document.getElementById('btnSearch');
  const spinner = document.getElementById('searchSpinner');
  btn.disabled = true;
  spinner.style.display = 'inline-block';
  nextUrl = null;

  try {
    const resp   = await fetch(fetchUrl, { headers: { Accept: 'application/fhir+json' } });
    const bundle = await resp.json();
    if (!resp.ok) {
      showToast(`查詢失敗：HTTP ${resp.status}`);
      renderError(bundle);
      return;
    }
    currentBundle = bundle;
    nextUrl = (bundle.link || []).find(l => l.relation === 'next')?.url || null;
    renderResults(bundle);
    document.getElementById('btnExport').style.display = 'inline-flex';
    updateURLPreview();
  } catch (e) {
    showToast(`網路錯誤：${e.message}`);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

/* ── 渲染結果表格 ── */
function renderResults(bundle) {
  const entries = bundle.entry || [];
  const total   = bundle.total ?? '?';
  const area    = document.getElementById('resultsArea');

  if (entries.length === 0) {
    area.innerHTML = `<div class="empty-state"><span class="icon">🔍</span><span>查無資料（total: ${total}）</span></div>`;
    return;
  }

  const cols = detectColumns(entries);

  let html = `
    <div class="results-header">
      <div class="results-summary">資源類型：<strong>${currentResource}</strong> ｜ 總計：<strong>${total}</strong> 筆 ｜ 本頁：<strong>${entries.length}</strong> 筆</div>
      <div class="pagination">
        <button class="btn btn-neutral" style="padding:5px 10px;font-size:0.75rem"
          onclick="goPrev()" ${prevStack.length === 0 ? 'disabled' : ''}>← 上一頁</button>
        <span class="page-info">第 ${prevStack.length + 1} 頁</span>
        <button class="btn btn-neutral" style="padding:5px 10px;font-size:0.75rem"
          onclick="goNext()" ${!nextUrl ? 'disabled' : ''}>下一頁 →</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>ID</th>
          <th>資源類型</th>
          ${cols.map(c => `<th>${c.label}</th>`).join('')}
          <th>最後更新</th>
        </tr></thead>
        <tbody>
  `;

  entries.forEach((e, idx) => {
    const r  = e.resource || {};
    const id = r.id || '—';
    const rt = r.resourceType || currentResource;
    const updated = r.meta?.lastUpdated ? new Date(r.meta.lastUpdated).toLocaleString('zh-TW', { hour12: false }) : '—';
    const status  = r.status || '';
    const statusCls = `status-${status || 'other'}`;

    html += `<tr onclick="showDetail(${idx})" data-idx="${idx}">
      <td class="cell-id">${id}</td>
      <td class="cell-type">${rt}</td>
      ${cols.map(c => `<td title="${escHtml(c.get(r))}">${escHtml(c.get(r))}</td>`).join('')}
      <td style="color:#718096;font-size:0.72rem">${updated}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  area.innerHTML = html;
}

function renderError(json) {
  const area = document.getElementById('resultsArea');
  area.innerHTML = `<div class="empty-state"><span class="icon">❌</span>
    <span>${json?.issue?.[0]?.diagnostics || '伺服器回傳錯誤'}</span></div>`;
}

/* ── 欄位自動偵測 ── */
function detectColumns(entries) {
  const rt = entries[0]?.resource?.resourceType || currentResource;
  const MAP = {
    Patient: [
      { label: '姓名',   get: r => formatHumanName(r.name) },
      { label: '性別',   get: r => r.gender || '—' },
      { label: '生日',   get: r => r.birthDate || '—' },
      { label: 'Identifier', get: r => r.identifier?.[0]?.value || '—' }
    ],
    Observation: [
      { label: '項目',   get: r => r.code?.text || r.code?.coding?.[0]?.display || r.code?.coding?.[0]?.code || '—' },
      { label: '數值',   get: r => r.valueQuantity ? `${r.valueQuantity.value} ${r.valueQuantity.unit||r.valueQuantity.code||''}` : (r.valueCodeableConcept?.text || '—') },
      { label: '狀態',   get: r => r.status || '—' },
      { label: '時間',   get: r => r.effectiveDateTime ? new Date(r.effectiveDateTime).toLocaleString('zh-TW',{hour12:false}) : '—' },
      { label: 'Patient', get: r => r.subject?.reference || '—' }
    ],
    Condition: [
      { label: '診斷',   get: r => r.code?.text || r.code?.coding?.[0]?.display || '—' },
      { label: '狀態',   get: r => r.clinicalStatus?.coding?.[0]?.code || '—' },
      { label: 'Patient', get: r => r.subject?.reference || '—' }
    ],
    MedicationRequest: [
      { label: '藥物',   get: r => r.medicationCodeableConcept?.text || r.medicationReference?.reference || '—' },
      { label: '狀態',   get: r => r.status || '—' },
      { label: 'Patient', get: r => r.subject?.reference || '—' }
    ],
    Encounter: [
      { label: '類型',   get: r => r.class?.display || r.class?.code || '—' },
      { label: '狀態',   get: r => r.status || '—' },
      { label: 'Patient', get: r => r.subject?.reference || '—' },
      { label: '開始時間', get: r => r.period?.start ? new Date(r.period.start).toLocaleString('zh-TW',{hour12:false}) : '—' }
    ],
    Practitioner: [
      { label: '姓名',   get: r => formatHumanName(r.name) },
      { label: '性別',   get: r => r.gender || '—' }
    ],
    Organization: [
      { label: '名稱',   get: r => r.name || '—' },
      { label: '類型',   get: r => r.type?.[0]?.text || r.type?.[0]?.coding?.[0]?.display || '—' }
    ],
    Immunization: [
      { label: '疫苗',   get: r => r.vaccineCode?.text || r.vaccineCode?.coding?.[0]?.display || '—' },
      { label: '狀態',   get: r => r.status || '—' },
      { label: '日期',   get: r => r.occurrenceDateTime ? new Date(r.occurrenceDateTime).toLocaleString('zh-TW',{hour12:false}) : '—' },
      { label: 'Patient', get: r => r.patient?.reference || '—' }
    ],
    AllergyIntolerance: [
      { label: '過敏原', get: r => r.code?.text || r.code?.coding?.[0]?.display || '—' },
      { label: '狀態',   get: r => r.clinicalStatus?.coding?.[0]?.code || '—' },
      { label: 'Patient', get: r => r.patient?.reference || '—' }
    ],
    Procedure: [
      { label: '處置',   get: r => r.code?.text || r.code?.coding?.[0]?.display || '—' },
      { label: '狀態',   get: r => r.status || '—' },
      { label: 'Patient', get: r => r.subject?.reference || '—' }
    ],
    DiagnosticReport: [
      { label: '報告',   get: r => r.code?.text || r.code?.coding?.[0]?.display || '—' },
      { label: '狀態',   get: r => r.status || '—' },
      { label: '時間',   get: r => r.effectiveDateTime ? new Date(r.effectiveDateTime).toLocaleString('zh-TW',{hour12:false}) : '—' }
    ]
  };
  return MAP[rt] || [
    { label: '名稱/代碼', get: r => r.name || r.title || r.code?.text || r.code?.coding?.[0]?.code || '—' },
    { label: '狀態',      get: r => r.status || '—' }
  ];
}

function formatHumanName(names) {
  if (!names || names.length === 0) return '—';
  const n = names[0];
  if (n.text) return n.text;
  const parts = [...(n.prefix||[]), ...(n.given||[]), n.family||''];
  return parts.filter(Boolean).join(' ') || '—';
}

/* ── 翻頁 ── */
function goNext() {
  if (!nextUrl) return;
  prevStack.push(buildURL(BASE));
  doSearch(nextUrl);
}
function goPrev() {
  if (prevStack.length === 0) return;
  const url = prevStack.pop();
  doSearch(url);
}

/* ── 詳細面板 ── */
function showDetail(idx) {
  const entries = currentBundle?.entry || [];
  const r = entries[idx]?.resource;
  if (!r) return;

  document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
  document.querySelector(`tbody tr[data-idx="${idx}"]`)?.classList.add('selected');

  document.getElementById('detailTitle').textContent = `${r.resourceType}/${r.id || '?'}`;
  document.getElementById('detailBody').innerHTML = syntaxHighlight(JSON.stringify(r, null, 2));
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('tbody tr').forEach(tr => tr.classList.remove('selected'));
}

/* ── JSON 語法高亮 ── */
function syntaxHighlight(json) {
  return json
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      if (/^"/.test(match)) {
        return /:$/.test(match)
          ? `<span class="json-key">${match}</span>`
          : `<span class="json-str">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
      if (/null/.test(match))       return `<span class="json-null">${match}</span>`;
      return `<span class="json-num">${match}</span>`;
    });
}

/* ── 匯出 ── */
function exportJSON() {
  if (!currentBundle) return;
  const blob = new Blob([JSON.stringify(currentBundle, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${currentResource}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('已下載 JSON 檔案');
}

/* ── Toast ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(str) {
  if (typeof str !== 'string') return str ?? '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Enter 觸發搜尋 ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName === 'INPUT') doSearch();
});

buildNav();
</script>
