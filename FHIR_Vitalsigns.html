<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vital Signs FHIR Uploader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; color: #2b6cb0; }
    header p  { font-size: 0.85rem; color: #718096; margin-top: 6px; }

    .server-info {
      background: #ebf8ff;
      border: 1px solid #bee3f8;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 28px;
      font-size: 0.82rem;
      color: #2c5282;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .server-info span strong { margin-right: 4px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px 22px;
      border-top: 4px solid #4299e1;
    }
    .card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #2d3748;
    }
    .card .loinc {
      font-size: 0.75rem;
      color: #a0aec0;
      margin-bottom: 16px;
    }

    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 4px;
    }
    .form-row input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #2d3748;
      transition: border-color 0.2s;
    }
    .form-row input:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 2px rgba(66,153,225,0.2);
    }
    .unit-hint {
      font-size: 0.72rem;
      color: #718096;
      margin-top: 3px;
    }

    .btn-upload {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-upload:hover  { background: #2b6cb0; }
    .btn-upload:active { transform: scale(0.98); }
    .btn-upload:disabled { background: #a0aec0; cursor: not-allowed; }

    .result-box {
      margin-top: 12px;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      font-family: 'Consolas', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }
    .result-box.success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .result-box.error   { background: #fff5f5; border: 1px solid #fc8181; color: #9b2c2c; }

    .log-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px 22px;
    }
    .log-section h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; color: #2d3748; }
    #globalLog {
      font-size: 0.78rem;
      font-family: 'Consolas', monospace;
      background: #1a202c;
      color: #68d391;
      border-radius: 8px;
      padding: 14px;
      min-height: 80px;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .log-entry { margin-bottom: 4px; }
    .log-entry.err { color: #fc8181; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 查詢區塊 ── */
    .query-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px 22px;
      margin-bottom: 24px;
    }
    .query-section h3 { font-size: 0.95rem; font-weight: 700; color: #2d3748; margin-bottom: 14px; }

    .query-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    .query-toolbar select,
    .query-toolbar input[type="number"] {
      padding: 8px 10px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #2d3748;
      background: #fff;
    }
    .query-toolbar select:focus,
    .query-toolbar input:focus {
      outline: none;
      border-color: #48bb78;
      box-shadow: 0 0 0 2px rgba(72,187,120,0.2);
    }
    .btn-query {
      padding: 9px 18px;
      background: #48bb78;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-query:hover    { background: #276749; }
    .btn-query:disabled { background: #a0aec0; cursor: not-allowed; }

    .query-spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .query-summary {
      font-size: 0.78rem;
      color: #718096;
      margin-bottom: 10px;
    }

    .query-table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead tr { background: #ebf8ff; }
    th {
      text-align: left;
      padding: 8px 10px;
      font-weight: 700;
      color: #2c5282;
      border-bottom: 2px solid #bee3f8;
      white-space: nowrap;
    }
    td {
      padding: 8px 10px;
      border-bottom: 1px solid #e2e8f0;
      color: #2d3748;
      vertical-align: top;
    }
    tbody tr:hover { background: #f7fafc; }
    .tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .tag-temp  { background: #fed7aa; color: #7c2d12; }
    .tag-hr    { background: #fbb6ce; color: #702459; }
    .tag-spo2  { background: #b2f5ea; color: #234e52; }
    .tag-other { background: #e2e8f0; color: #4a5568; }

    .empty-row td {
      text-align: center;
      color: #a0aec0;
      padding: 24px;
    }
  </style>
</head>
<body>

<header>
  <h1>Vital Signs FHIR Uploader</h1>
  <p>Micro IG — 生命徵象觀察上傳工具</p>
</header>

<div class="server-info">
  <span><strong>FHIR Server：</strong>https://hapi.fhir.org/baseR4/</span>
  <span><strong>Patient ID：</strong>90252386</span>
  <span><strong>資源：</strong>Observation (vital-signs)</span>
</div>

<div class="cards" id="cardContainer"></div>

<!-- ── 查詢區塊 ── -->
<div class="query-section">
  <h3>查詢已上傳的 Observations</h3>
  <div class="query-toolbar">
    <select id="queryFilter">
      <option value="">全部生命徵象</option>
      <option value="8310-5">體溫（8310-5）</option>
      <option value="8867-4">心率（8867-4）</option>
      <option value="59408-5">脈搏血氧（59408-5）</option>
    </select>
    <input type="number" id="queryCount" value="10" min="1" max="50" title="筆數上限" style="width:70px" />
    <span style="font-size:0.78rem;color:#718096">筆</span>
    <button class="btn-query" id="btnQuery">
      <span class="query-spinner" id="querySpinner"></span>
      查詢
    </button>
  </div>
  <div class="query-summary" id="querySummary"></div>
  <div class="query-table-wrap">
    <table id="queryTable">
      <thead>
        <tr>
          <th>Obs ID</th>
          <th>項目</th>
          <th>量測值</th>
          <th>單位</th>
          <th>量測時間</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="queryTbody">
        <tr class="empty-row"><td colspan="6">按「查詢」載入資料</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="log-section">
  <h3>上傳紀錄</h3>
  <div id="globalLog">等待上傳...</div>
</div>

<script>
const FHIR_SERVER = 'https://hapi.fhir.org/baseR4/Observation';
const PATIENT_ID  = '90252386';

const VALUE_SET = [
  {
    name: '體溫',
    loinc: '8310-5',
    display: 'Body temperature',
    unitDisplay: '攝氏度',
    ucum: 'Cel',
    placeholder: '例：36.8',
    step: '0.1',
    min: '30',
    max: '45'
  },
  {
    name: '心率',
    loinc: '8867-4',
    display: 'Heart rate',
    unitDisplay: '次/分',
    ucum: '/min',
    placeholder: '例：72',
    step: '1',
    min: '20',
    max: '300'
  },
  {
    name: '脈搏血氧',
    loinc: '59408-5',
    display: 'Oxygen saturation in Arterial blood by Pulse oximetry',
    unitDisplay: '百分比',
    ucum: '%',
    placeholder: '例：98',
    step: '0.1',
    min: '50',
    max: '100'
  }
];

function nowISO() {
  return new Date().toISOString().slice(0, 19) + 'Z';
}

function buildObservation(item, value, datetime) {
  return {
    resourceType: 'Observation',
    status: 'final',
    category: [{
      coding: [{
        system: 'http://terminology.hl7.org/CodeSystem/observation-category',
        code: 'vital-signs',
        display: 'Vital Signs'
      }]
    }],
    code: {
      coding: [{
        system: 'http://loinc.org',
        code: item.loinc,
        display: item.display
      }],
      text: item.name
    },
    subject: {
      reference: `Patient/${PATIENT_ID}`
    },
    effectiveDateTime: datetime,
    valueQuantity: {
      value: parseFloat(value),
      unit: item.unitDisplay,
      system: 'http://unitsofmeasure.org',
      code: item.ucum
    }
  };
}

function appendLog(msg, isError = false) {
  const log = document.getElementById('globalLog');
  const ts  = new Date().toLocaleTimeString('zh-TW');
  const div = document.createElement('div');
  div.className = 'log-entry' + (isError ? ' err' : '');
  div.textContent = `[${ts}] ${msg}`;
  if (log.textContent === '等待上傳...') log.textContent = '';
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function uploadObservation(item, btn, resultBox) {
  const card = btn.closest('.card');
  const valueInput = card.querySelector('.obs-value');
  const timeInput  = card.querySelector('.obs-time');
  const spinner    = card.querySelector('.spinner');

  const val = valueInput.value.trim();
  if (!val || isNaN(parseFloat(val))) {
    resultBox.className = 'result-box error';
    resultBox.style.display = 'block';
    resultBox.textContent = '請輸入有效的數值';
    return;
  }

  const datetime = timeInput.value
    ? new Date(timeInput.value).toISOString().slice(0, 19) + 'Z'
    : nowISO();

  const obs = buildObservation(item, val, datetime);

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  resultBox.style.display = 'none';
  appendLog(`正在上傳 ${item.name}（LOINC ${item.loinc}）…`);

  try {
    const resp = await fetch(FHIR_SERVER, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/fhir+json',
        'Accept': 'application/fhir+json'
      },
      body: JSON.stringify(obs)
    });

    const json = await resp.json();

    if (resp.ok) {
      const id = json.id || '（未知）';
      resultBox.className = 'result-box success';
      resultBox.textContent =
        `✅ 上傳成功\n` +
        `ID：${id}\n` +
        `狀態碼：${resp.status}\n\n` +
        JSON.stringify(json, null, 2);
      appendLog(`✅ ${item.name} 上傳成功，Observation ID：${id}`);
    } else {
      resultBox.className = 'result-box error';
      resultBox.textContent =
        `❌ 上傳失敗（${resp.status}）\n\n` +
        JSON.stringify(json, null, 2);
      appendLog(`❌ ${item.name} 上傳失敗：HTTP ${resp.status}`, true);
    }
  } catch (err) {
    resultBox.className = 'result-box error';
    resultBox.textContent = `❌ 網路錯誤：${err.message}`;
    appendLog(`❌ ${item.name} 網路錯誤：${err.message}`, true);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    resultBox.style.display = 'block';
  }
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  VALUE_SET.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h2>${item.name}</h2>
      <div class="loinc">LOINC：${item.loinc} ｜ UCUM：${item.ucum}</div>

      <div class="form-row">
        <label>量測值</label>
        <input class="obs-value" type="number"
               placeholder="${item.placeholder}"
               step="${item.step}" min="${item.min}" max="${item.max}" />
        <div class="unit-hint">單位：${item.unitDisplay}（${item.ucum}）</div>
      </div>

      <div class="form-row">
        <label>量測時間</label>
        <input class="obs-time" type="datetime-local" />
        <div class="unit-hint">留空則自動使用當前時間</div>
      </div>

      <button class="btn-upload">
        <span class="spinner"></span>
        上傳 ${item.name} Observation
      </button>

      <div class="result-box"></div>
    `;

    const btn       = card.querySelector('.btn-upload');
    const resultBox = card.querySelector('.result-box');
    btn.addEventListener('click', () => uploadObservation(item, btn, resultBox));

    container.appendChild(card);
  });
}

renderCards();

/* ── 查詢功能 ── */
const LOINC_LABEL = {
  '8310-5':  { name: '體溫',   cls: 'tag-temp'  },
  '8867-4':  { name: '心率',   cls: 'tag-hr'    },
  '59408-5': { name: '脈搏血氧', cls: 'tag-spo2' }
};

function formatDateTime(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('zh-TW', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    });
  } catch { return iso; }
}

function getLoinc(entry) {
  try {
    return entry.resource.code.coding[0].code;
  } catch { return ''; }
}

function renderTable(entries) {
  const tbody = document.getElementById('queryTbody');
  tbody.innerHTML = '';

  if (!entries || entries.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">查無資料</td></tr>';
    return;
  }

  entries.forEach(e => {
    const obs     = e.resource;
    const id      = obs.id || '—';
    const loinc   = getLoinc(e);
    const meta    = LOINC_LABEL[loinc] || { name: loinc || '—', cls: 'tag-other' };
    const val     = obs.valueQuantity?.value ?? '—';
    const unit    = obs.valueQuantity?.unit  ?? obs.valueQuantity?.code ?? '—';
    const time    = formatDateTime(obs.effectiveDateTime || obs.effectivePeriod?.start);
    const status  = obs.status || '—';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-family:monospace;font-size:0.72rem;color:#4a5568">${id}</td>
      <td><span class="tag ${meta.cls}">${meta.name}</span></td>
      <td style="font-weight:700">${val}</td>
      <td style="color:#718096">${unit}</td>
      <td style="white-space:nowrap">${time}</td>
      <td style="color:#48bb78;font-weight:600">${status}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function queryObservations() {
  const btn     = document.getElementById('btnQuery');
  const spinner = document.getElementById('querySpinner');
  const summary = document.getElementById('querySummary');
  const filter  = document.getElementById('queryFilter').value;
  const count   = parseInt(document.getElementById('queryCount').value) || 10;

  let url = `https://hapi.fhir.org/baseR4/Observation?patient=${PATIENT_ID}&category=vital-signs&_sort=-date&_count=${count}`;
  if (filter) url += `&code=${filter}`;

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  summary.textContent = '查詢中…';
  appendLog(`正在查詢 Patient/${PATIENT_ID} 的 Observations…`);

  try {
    const resp = await fetch(url, {
      headers: { 'Accept': 'application/fhir+json' }
    });
    const bundle = await resp.json();

    if (!resp.ok) {
      summary.textContent = `查詢失敗：HTTP ${resp.status}`;
      appendLog(`❌ 查詢失敗：HTTP ${resp.status}`, true);
      renderTable([]);
      return;
    }

    const entries = bundle.entry || [];
    const total   = bundle.total ?? entries.length;
    const label   = filter ? (LOINC_LABEL[filter]?.name || filter) : '全部生命徵象';

    summary.textContent = `查詢條件：${label} ｜ 伺服器回報總筆數：${total} ｜ 本次顯示：${entries.length} 筆`;
    appendLog(`✅ 查詢完成，取得 ${entries.length} 筆（${label}）`);
    renderTable(entries);
  } catch (err) {
    summary.textContent = `網路錯誤：${err.message}`;
    appendLog(`❌ 查詢網路錯誤：${err.message}`, true);
    renderTable([]);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

document.getElementById('btnQuery').addEventListener('click', queryObservations);
</script>
</body>
</html>
